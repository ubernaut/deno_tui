<style>
svg{background:#06080d}.frame{fill:#0d1117;stroke:var(--border);stroke-width:4}.title{fill:#f8fafc;font:700 52px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.term{font:42px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.bar{fill:#111827;stroke:#374151}.screen{fill:#090d14;opacity:.91}.glow{filter:drop-shadow(0 0 18px var(--glow))}.plain{fill:var(--fg)}.muted{fill:var(--muted)}.border{fill:var(--border)}.accent{fill:var(--accent)}.success{fill:var(--success)}.warning{fill:var(--warning)}.danger{fill:var(--danger)}.violet{fill:var(--violet)}.pink{fill:var(--pink)}.blue{fill:var(--blue)}.green{fill:var(--green)}.heat{fill:var(--heat)}.surface{fill:var(--surface)}.theme-neon{--fg:#d7fff7;--muted:#77909a;--border:#2dd4bf;--accent:#67e8f9;--success:#a3e635;--warning:#facc15;--danger:#fb7185;--violet:#c084fc;--pink:#f472b6;--blue:#60a5fa;--green:#34d399;--heat:#f97316;--surface:#93c5fd;--glow:#2dd4bf}.theme-exodus{--fg:#f7e8ff;--muted:#9478a8;--border:#a855f7;--accent:#22d3ee;--success:#bef264;--warning:#fbbf24;--danger:#ff4fd8;--violet:#c084fc;--pink:#fb7185;--blue:#38bdf8;--green:#4ade80;--heat:#f97316;--surface:#e879f9;--glow:#ff4fd8}.theme-system{--fg:#dbeafe;--muted:#94a3b8;--border:#38bdf8;--accent:#67e8f9;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--violet:#a78bfa;--pink:#f472b6;--blue:#3b82f6;--green:#10b981;--heat:#f97316;--surface:#93c5fd;--glow:#38bdf8}.theme-gallery{--fg:#f8fafc;--muted:#94a3b8;--border:#818cf8;--accent:#f472b6;--success:#34d399;--warning:#fbbf24;--danger:#fb7185;--violet:#c084fc;--pink:#f472b6;--blue:#60a5fa;--green:#4ade80;--heat:#fb923c;--surface:#a5b4fc;--glow:#818cf8}.theme-theme{--fg:#f7effa;--muted:#b8a6c4;--border:#ac7cc8;--accent:#f694d8;--success:#aad68c;--warning:#ffd08b;--danger:#f27d96;--violet:#c084fc;--pink:#f694d8;--blue:#9db7ff;--green:#7be0bb;--heat:#ff9f68;--surface:#ddd0e6;--glow:#f694d8}.theme-docs{--fg:#e5e7eb;--muted:#9ca3af;--border:#64748b;--accent:#93c5fd;--success:#86efac;--warning:#fde68a;--