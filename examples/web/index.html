<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deno TUI Web Standalone</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #05070d;
      }

      body {
        display: grid;
        place-items: center;
        overscroll-behavior: none;
      }

      #app {
        width: min(960px, 100vw);
        height: min(560px, 100vh);
        outline: none;
        touch-action: none;
        user-select: none;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <main id="app" aria-label="Deno TUI standalone browser demo"></main>
    <script type="module" src="./standalone.ts"></script>
  </body>
</html>
