name: Deno

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: deno-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
          cache-hash: ${{ hashFiles('deno.jsonc') }}

      - name: Run contributor health gate
        env:
          DENO_NO_PACKAGE_JSON: "1"
        run: deno task health

      - name: Verify clean release candidate
        env:
          DENO_NO_PACKAGE_JSON: "1"
        run: deno task release-check -- --clean
